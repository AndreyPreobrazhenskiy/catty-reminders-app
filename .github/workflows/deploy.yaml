name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (on Runner)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          echo "✅ Build complete on Runner"

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 2200
          username: andrey
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment on VM..."

            cd ~/Desktop/DevOps_lab1/catty-reminders-app

            git fetch origin lab2
            git reset --hard origin/lab2

            pip3 install --break-system-packages -r requirements.txt
            echo "DEPLOY_REF=${{ github.sha }}" | sudo tee /tmp/deploy_ref.txt
            sudo chmod 644 /tmp/deploy_ref.txt

            sudo systemctl restart catty-app.service
            sleep 5

            if curl -s http://localhost:8181/login | grep -q "deployref"; then
              echo "✅ Application is running on port 8181"
            else
              echo "❌ Application failed to start"
              exit 1
            fi

            echo "✅ Deployment complete!"
